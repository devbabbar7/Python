{% extends "base.html" %}
{% block title %}Index Page{% endblock %}

{% block content %}
    <h1>Hello, World!</h1>
    <form method = "POST" action = "{{url_for('index')}}">
        <!-- type text and password are sent as empty strings so you many not need to do an if check, however there are other types 
         which are not sent at all if you don't touch them like checkbox, radio, select etc.-->
        <input type="text" name="username" placeholder="Username"><br>
        <input type="password" name="password" placeholder="Password"><br> <!-- type="password" hides the password while typing -->
        <input type="submit" value="Login">
    </form>

    <h1>File Upload</h1>
    <form method="POST" action="{{url_for('file_upload')}}" enctype="multipart/form-data">
        <input type="file" name="file" accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel, text/plain" required="required">
        <input type="submit" value = "Upload File">
    </form>

    <h1>Convert to CSV</h1>
    <form method="POST" action="{{url_for('convert_csv')}}" enctype="multipart/form-data">
        <input type="file" name="file" accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" required="required">
        <input type="submit" value = "Upload File">
    </form>

    <h1>Convert to CSV two</h1>
    <form method="POST" action="{{url_for('convert_csv_two')}}" enctype="multipart/form-data">
        <input type="file" name="file" accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" required="required">
        <input type="submit" value = "Upload File">
    </form>

    <h1>Javascript JSON Request</h1>
    <button id="post_button">Send POST Request</button>
    <!-- Normally, we will create a seperate js file and write our scripts there. -->
    <!-- <script src="{{ url_for('static', filename='app.js') }}"></script> -->
    <script type="text/javascript">
        const postButton = document.getElementById('post_button')
        const jsonData = {name: 'Mike', greeting: 'Hello'}

        postButton.addEventListener('click', () =>{
            fetch('{{url_for("handle_post")}}',{
                method: 'POST',
                headers: { // This is to let flask know what kind of data you are sending.
                    'Content-Type': 'application/json; charset=utf-8'
                },
                body: JSON.stringify(jsonData) // Sending the actual data
            })
            .then(response => response.json()) // This parses the response in json so we can use it.
            .then(data => { // .then(data =>) can't be used again after this then
                console.log('TYPE:', typeof data) // To show response in console
                console.log('DATA:', data)
                console.log('KEYS:', Object.keys(data))
                alert(data.message) // A popup will show the reponse.
            })
            .catch((error) => {
                console.error('Error', error)
            });
        });
    </script>

{% endblock %}
